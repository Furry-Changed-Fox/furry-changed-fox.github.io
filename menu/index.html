<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Joiner Menu</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body data-page="menu">
  <main class="page">
    <section class="card">
      <h1>Joiner Menu</h1>
      <p>Choose whether you want a <strong>public</strong> or <strong>private</strong> join link, then fill in the needed Roblox info below.</p>

      <div class="toggle-row" role="radiogroup" aria-label="Join type">
        <label class="toggle-option">
          <input type="radio" name="joinType" value="public" checked />
          <span>Public Server</span>
        </label>
        <label class="toggle-option">
          <input type="radio" name="joinType" value="private" />
          <span>Private Server</span>
        </label>
      </div>

      <div class="stack">
        <div class="field" id="place-field">
          <label for="placeId">Place ID</label>
          <input id="placeId" inputmode="numeric" placeholder="606849621" />
        </div>

        <div id="public-fields">
          <div class="field">
            <label for="gameInstanceId">Game Instance ID <span class="small">(optional)</span></label>
            <input id="gameInstanceId" placeholder="b7b55207-ab2f-4b62-acd7-7f5962b13a26" />
          </div>
          <div class="field" id="invite-link-field">
            <label for="inviteLink">Existing Invite Link <span class="small">(optional)</span></label>
            <input id="inviteLink" placeholder="Paste a Froststrap-style or Roblox invite link here" />
          </div>
        </div>

        <div id="private-fields" class="hidden">
          <div class="field">
            <label for="privateCode">Private Server Share Link or Code</label>
            <input id="privateCode" placeholder="https://www.roblox.com/share?code=...&type=Server" />
          </div>
          <div class="field">
            <label for="privateGameLink">Roblox Game Private Server Link <span class="small">(optional dedicated field)</span></label>
            <input id="privateGameLink" placeholder="https://www.roblox.com/games/...?...privateServerLinkCode=..." />
          </div>
        </div>
      </div>

      <div class="buttons">
        <button class="button" id="launch-invite">Join Server</button>
        <button class="button secondary" id="view-game">View Game</button>
        <button class="button secondary" id="copy-link">Copy Join Link</button>
      </div>

      <div class="divider"></div>

      <div class="field">
        <label>Other Pages</label>
        <div class="buttons" style="margin: 0;">
          <a class="button secondary" href="../ps/">Open Private Servers</a>
        </div>
      </div>

      <p><strong>Generated join link</strong></p>
      <div class="code-block" id="generated-link">Fill in the required fields to generate a join link.</div>
      <p class="small status" id="status">Enter a place ID. Game instance ID is optional for public joins.</p>
    </section>
  </main>
  <script src="../app.v2.js"></script>
</body>
</html>
