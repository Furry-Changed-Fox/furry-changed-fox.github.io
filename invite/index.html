<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join Roblox Server</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body data-page="invite">
  <main class="page">
    <section class="card">
      <div id="ready-state">
        <h1>Join Server</h1>
        <p id="invite-description">Tap the button below to open the Roblox app for this exact server on desktop or mobile. If Roblox does not launch, use the fallback web button.</p>
        <div class="buttons">
          <button class="button" id="open-app">Open Roblox App</button>
          <a class="button secondary" id="open-web" href="#">Open Roblox Web Page</a>
          <a class="button secondary" href="../menu/">Open Menu</a>
        </div>
        <p><strong id="place-label">Place ID</strong></p>
        <code id="place-id"></code>
        <p><strong id="job-label">Server Job ID</strong></p>
        <code id="job-id"></code>
      </div>

      <p class="small status" id="status">Preparing invite…</p>
    </section>
  </main>
  <script src="../app.js"></script>
</body>
</html>
